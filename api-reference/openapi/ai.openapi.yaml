openapi: 3.0.3
info:
  title: DreamScape AI API
  description: |
    Recommandations personnalisées, segmentation, prédictions ML, cold start.
    Utilise UserVector / ItemVector et OpenAI.
    Service AI (port 3005) — exposé via le Gateway sur `/api/v1/ai`.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1/ai
    description: Gateway local (dev)
  - url: https://api.dreamscape.app/api/v1/ai
    description: Production

tags:
  - { name: Recommendations, description: Génération et tracking }
  - { name: ColdStart,       description: Recommandations sans historique }
  - { name: Segmentation,    description: Segments comportementaux }
  - { name: Onboarding,      description: Initialisation du UserVector }
  - { name: Predictions,     description: Prédictions comportementales }
  - { name: Accommodations,  description: Recommandations hôtels }
  - { name: System,          description: Health check }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    GenerateRequest:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
        contextType:
          type: string
          enum: [general, flight, hotel, activity]
          default: general
        limit: { type: integer, default: 10, maximum: 50 }
        minScore: { type: number, format: float, default: 0.3, minimum: 0, maximum: 1 }

    Recommendation:
      type: object
      properties:
        destinationId: { type: string, example: "BCN" }
        destinationName: { type: string, example: "Barcelona" }
        destinationType:
          type: string
          enum: [CITY, REGION, COUNTRY]
        score: { type: number, format: float }
        confidence: { type: number, format: float }
        reasons:
          type: array
          items: { type: string }
        breakdown:
          type: object
          properties:
            popularityScore: { type: number }
            similarityScore: { type: number }
            finalScore: { type: number }

    RecommendationResponse:
      type: object
      properties:
        userId: { type: string }
        count: { type: integer }
        recommendations:
          type: array
          items: { $ref: '#/components/schemas/Recommendation' }

    PopularDestination:
      type: object
      properties:
        destinationId: { type: string }
        name: { type: string }
        destinationType: { type: string }
        popularityScore: { type: number }
        bookingCount: { type: integer }
        searchCount: { type: integer }

    TrackRequest:
      type: object
      required: [userId, destinationId, action]
      properties:
        userId: { type: string }
        destinationId: { type: string }
        action:
          type: string
          enum: [view, click, book, dismiss]

    Segment:
      type: string
      enum:
        - BUDGET_BACKPACKER
        - FAMILY_EXPLORER
        - LUXURY_TRAVELER
        - ADVENTURE_SEEKER
        - CULTURAL_ENTHUSIAST
        - ROMANTIC_COUPLE
        - BUSINESS_LEISURE
        - SENIOR_COMFORT

    SegmentationResponse:
      type: object
      properties:
        userId: { type: string }
        segment: { $ref: '#/components/schemas/Segment' }
        confidence: { type: number, format: float }
        vector:
          type: array
          items: { type: number }

    OnboardingInitRequest:
      type: object
      required: [userId, onboardingData]
      properties:
        userId: { type: string }
        onboardingData:
          type: object
          properties:
            travelBudget: { type: string, enum: [low, medium, high, luxury] }
            groupType: { type: string, enum: [solo, couple, family, friends, business] }
            preferredActivities:
              type: array
              items: { type: string }
            preferredClimate: { type: string, enum: [warm, cold, temperate, tropical] }
            travelFrequency:
              type: string
              enum: [rare, 1-2_per_year, 2-3_per_year, 3-4_per_year, monthly]

security:
  - bearerAuth: []

paths:
  /recommendations/generate:
    post:
      tags: [Recommendations]
      summary: Générer des recommandations personnalisées
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateRequest' }
      responses:
        '200':
          description: Liste de recommandations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecommendationResponse' }

  /recommendations/personalized:
    get:
      tags: [Recommendations]
      summary: Recommandations actives de l'utilisateur
      parameters:
        - { in: query, name: userId, required: true, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 10 } }
        - { in: query, name: status, schema: { type: string, enum: [ACTIVE, VIEWED, CLICKED] } }
        - { in: query, name: includeItemVector, schema: { type: boolean, default: false } }
      responses: { '200': { description: OK } }

  /recommendations/popular:
    get:
      tags: [Recommendations]
      summary: Destinations populaires
      security: []
      parameters:
        - { in: query, name: segment, schema: { $ref: '#/components/schemas/Segment' } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 10, maximum: 50 } }
      responses:
        '200':
          description: Liste des destinations populaires
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  popular:
                    type: array
                    items: { $ref: '#/components/schemas/PopularDestination' }
                  metadata:
                    type: object
                    properties:
                      source: { type: string }
                      segment: { type: string }

  /recommendations/cold-start:
    get:
      tags: [ColdStart]
      summary: Recommandations pour nouveaux utilisateurs
      security: []
      parameters:
        - { in: query, name: userId, required: true, schema: { type: string } }
        - in: query
          name: strategy
          schema:
            type: string
            enum: [adaptive, popularity_only, hybrid_segment, hybrid_preferences]
            default: adaptive
        - { in: query, name: limit, schema: { type: integer, default: 20, maximum: 50 } }
        - { in: query, name: diversityFactor, schema: { type: number, default: 0.3, minimum: 0, maximum: 1 } }
      responses:
        '200':
          description: Recommandations cold start
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RecommendationResponse'
                  - type: object
                    properties:
                      strategy: { type: string }

  /recommendations/track:
    post:
      tags: [Recommendations]
      summary: Tracker une interaction utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackRequest' }
      responses:
        '200': { description: Tracké }

  /recommendations/segmentation/{userId}:
    get:
      tags: [Segmentation]
      summary: Segment comportemental d'un utilisateur
      parameters:
        - { in: path, name: userId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Segment et vecteur
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SegmentationResponse' }

  /accommodations/recommendations:
    get:
      tags: [Accommodations]
      summary: Recommandations hôtels personnalisées
      parameters:
        - { in: query, name: cityCode, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 10 } }
      responses: { '200': { description: OK } }

  /onboarding/initialize:
    post:
      tags: [Onboarding]
      summary: Créer / mettre à jour le UserVector depuis l'onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OnboardingInitRequest' }
      responses:
        '200': { description: UserVector créé }
        '201': { description: UserVector créé (nouveau) }

  /predictions/{userId}:
    get:
      tags: [Predictions]
      summary: Prédictions comportementales
      parameters:
        - { in: path, name: userId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Prédictions
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: string }
                  predictions:
                    type: object
                    properties:
                      nextDestinationLikelihood: { type: object }
                      bookingProbability: { type: number }
                      churnRisk: { type: number }

  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: healthy }
                  uptime: { type: number }
                  database: { type: string }
                  openai: { type: string }
